<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Montana - Luke Young</title>
    <link rel="canonical" href="https://yng.sh/montana_gallery.html">
    <meta name="theme-color" content="#111827">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png">
    <meta property="og:title" content="Montana Gallery - Luke Young">
    <meta property="og:url" content="https://yng.sh/montana_gallery.html">
    <style>
        :root {
            --color-ivory: #FFFFF0;
            --color-indigo-light: #a5b4fc;
            --font-sans: "Times New Roman", Times, Georgia, serif;
            --font-serif: "Times New Roman", Times, Georgia, serif;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #000;
            color: var(--color-ivory);
            font-family: var(--font-sans);
            overflow-x: hidden;
        }

        .content-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            padding: 2rem;
            padding-top: 4rem;
        }

        .back-link {
            display: inline-block;
            color: var(--color-ivory);
            text-decoration: none;
            opacity: 0.6;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            transition: opacity 0.2s;
        }

        .back-link:hover {
            opacity: 1;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-header h1 {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            font-weight: 400;
            margin: 0 0 0.5rem 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .page-header p {
            opacity: 0.7;
            margin: 0;
            font-size: 1rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-item {
            aspect-ratio: 4/3;
            overflow: hidden;
            border-radius: 6px;
            cursor: pointer;
            background: rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .gallery-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        /* Lightbox */
        #lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            border: none;
            padding: 0;
            max-width: 100%;
            max-height: 100%;
            z-index: 1000;
        }

        #lightbox::backdrop {
            background: rgba(0,0,0,0.95);
        }

        #lightbox[open] {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
        }

        .lightbox-btn {
            position: absolute;
            background: transparent;
            border: none;
            color: var(--color-ivory);
            font-size: 2rem;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
            padding: 1rem;
        }

        .lightbox-btn:hover {
            opacity: 1;
        }

        .lightbox-close {
            top: 1rem;
            right: 1rem;
            font-size: 2.5rem;
        }

        .lightbox-prev {
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
        }

        .lightbox-next {
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
        }

        .footer {
            text-align: center;
            padding: 3rem 0;
            opacity: 0.4;
            font-size: 0.875rem;
        }

        @media (max-width: 768px) {
            .content-container {
                padding: 1rem;
                padding-top: 2rem;
            }

            .page-header h1 {
                font-size: 2rem;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 0.5rem;
            }

            .lightbox-btn {
                font-size: 1.5rem;
            }
        }
    </style>
  <script type="module" crossorigin src="/js/montana-BmMEDE7g.js"></script>
  <link rel="modulepreload" crossorigin href="/js/modulepreload-polyfill-B5Qt9EMX.js">
</head>
<body>
    <div class="content-container">
        <a href="/" class="back-link">← Back to Home</a>

        <header class="page-header">
            <h1>Montana</h1>
            <p>Photos from the Bob Marshall Wilderness</p>
        </header>

        <div class="gallery" id="gallery">
            <!-- Images loaded via JS -->
        </div>

        <footer class="footer">
            &copy; 2025 Luke Young
        </footer>
    </div>

    <dialog id="lightbox">
        <img id="lightbox-img" src="" alt="">
        <button class="lightbox-btn lightbox-close" aria-label="Close">×</button>
        <button class="lightbox-btn lightbox-prev" aria-label="Previous">‹</button>
        <button class="lightbox-btn lightbox-next" aria-label="Next">›</button>
    </dialog>


    <!-- GoatCounter Analytics -->
    <script data-goatcounter="https://yunguid.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
</body>
</html>
