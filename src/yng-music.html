<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>YNG Music</title>
    <meta name="robots" content="noindex,nofollow">
    <meta name="theme-color" content="#111827">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body class="music-archive-page">
    <main class="music-archive-shell">
        <header class="music-archive-header">
            <a class="music-archive-back" href="/" aria-label="Back to main site">
                <span aria-hidden="true">←</span>
            </a>
            <div class="music-archive-title">
                <h1>YNG Music</h1>
                <p id="music-summary">Unlisted archive of exported tracks.</p>
            </div>
            <section id="music-upload" class="music-upload" aria-label="Upload music">
                <input id="music-upload-input" type="file" accept=".mp3,.wav,.wave,audio/mpeg,audio/wav,audio/wave,audio/x-wav,audio/vnd.wave" multiple hidden>
                <button id="music-upload-button" class="music-upload-button" type="button">
                    <span class="music-upload-primary">Upload Audio</span>
                    <span class="music-upload-secondary">Browse</span>
                </button>
                <p id="music-upload-status" class="music-upload-status" aria-live="polite"></p>
            </section>
        </header>

        <section class="music-archive-toolbar" aria-label="Music filters">
            <label class="music-search-label" for="music-search">Search</label>
            <input id="music-search" class="music-search" type="search" autocomplete="off" placeholder="Filter tracks">
            <div class="music-sort-field">
                <label for="music-sort">Sort</label>
                <select id="music-sort" class="music-sort">
                    <option value="newest" selected>Newest first</option>
                    <option value="oldest">Oldest first</option>
                    <option value="title">Title A-Z</option>
                </select>
            </div>
            <div id="music-count" class="music-count"></div>
        </section>

        <section class="music-player" aria-label="Music player">
            <button id="music-player-toggle" class="music-player-toggle" type="button" aria-label="Select a track to play" title="Select a track to play" disabled>
                <span class="music-player-icon music-player-icon-play" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false">
                        <path d="M8 5v14l11-7z"></path>
                    </svg>
                </span>
                <span class="music-player-icon music-player-icon-pause" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false">
                        <path d="M7 5h3v14H7z"></path>
                        <path d="M14 5h3v14h-3z"></path>
                    </svg>
                </span>
                <span class="music-player-toggle-label">Play</span>
            </button>
            <button id="music-player-shuffle" class="music-player-shuffle" type="button" aria-label="Shuffle tracks" title="Shuffle tracks" disabled>
                <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                    <path d="m18 14 4 4-4 4"></path>
                    <path d="m18 2 4 4-4 4"></path>
                    <path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7L14 6.7C14.8 5.6 16 5 17.3 5H22"></path>
                    <path d="M2 6h1.9c1.5 0 2.9.9 3.6 2.2"></path>
                    <path d="M22 18h-4.7c-1.3 0-2.5-.6-3.3-1.7l-.8-1"></path>
                </svg>
            </button>
            <div class="music-player-now">
                <h2 id="music-player-title">Select a track</h2>
                <p id="music-player-meta">Ready</p>
            </div>
            <div class="music-player-timeline">
                <span id="music-player-current">0:00</span>
                <input id="music-player-progress" class="music-player-progress" type="range" min="0" max="1000" value="0" disabled aria-label="Seek">
                <span id="music-player-duration">0:00</span>
            </div>
        </section>

        <section id="music-visualizer" class="music-visualizer" aria-label="Audio visualizer">
            <div class="music-visualizer-header">
                <span>Wave Candy</span>
                <span id="music-visualizer-status">Idle</span>
            </div>
            <div class="music-visualizer-grid">
                <div class="music-visualizer-tile music-visualizer-spectrogram">
                    <span>Spectrogram</span>
                    <canvas id="music-spectrogram-canvas" class="music-visualizer-canvas"></canvas>
                </div>
                <div class="music-visualizer-tile music-visualizer-scope">
                    <span>Oscilloscope</span>
                    <canvas id="music-scope-canvas" class="music-visualizer-canvas"></canvas>
                </div>
                <div class="music-visualizer-tile music-visualizer-spectrum">
                    <span>Spectrum</span>
                    <canvas id="music-spectrum-canvas" class="music-visualizer-canvas"></canvas>
                </div>
            </div>
        </section>

        <section id="music-list" class="music-archive-list" aria-live="polite"></section>
    </main>

    <script type="module" src="/yng-music-page.js"></script>
</body>
</html>
